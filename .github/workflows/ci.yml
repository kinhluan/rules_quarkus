name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Set up Bazel
      uses: bazel-contrib/setup-bazel@0.14.0
      with:
        bazelisk-version: 1.x

    - name: Cache Bazel
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/bazel
          ~/.cache/bazelisk
        key: ${{ runner.os }}-bazel-${{ hashFiles('**/MODULE.bazel', '**/BUILD.bazel') }}
        restore-keys: |
          ${{ runner.os }}-bazel-

    - name: Build Core Tools
      run: bazel build //tools/...

    - name: Build and Test Hello World Example
      run: |
        bazel build //examples/hello-world:hello-world
        # Verify the executable exists
        ls -l bazel-bin/examples/hello-world/hello-world

    - name: Build and Test Tiered Extensions Demo
      run: |
        # This is the most important test for classloader and tiered support
        bazel build //examples/demo-extensions:demo-extensions
        # Verify the executable exists
        ls -l bazel-bin/examples/demo-extensions/demo-extensions

    - name: Test All Targets
      run: bazel test //... --test_output=errors
